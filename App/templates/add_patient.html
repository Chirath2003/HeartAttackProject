<!DOCTYPE html>
<html>
<head>
    <title>Add Patient</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="topbar">
        <div class="brand"><span class="heart">❤️</span> Heart Attack Prediction System</div>
        <div class="user-info"><a href="/dashboard" style="color:#fff; text-decoration:none;">← Dashboard</a></div>
    </div>

    <div class="page-wrap">
        <div class="card">
            <h2>🧑‍⚕️ Add Patient</h2>
            <p style="color: var(--muted); margin-top: -8px;">Register a new patient health record.</p>

            <form method="POST">

                <div class="field">
                    <label>Patient Name</label>
                    <input type="text" name="patient_name" required>
                </div>

                <div class="grid-2">
                    <div class="field">
                        <label>Age</label>
                        <input type="number" name="age" required>
                    </div>

                    <div class="field">
                        <label>Gender</label>
                        <select name="gender">
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="field">
                        <label>Hypertension</label>
                        <select name="hypertension">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Diabetes</label>
                        <select name="diabetes">
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>
                </div>

                <div class="field">
                    <label>Cholesterol Level</label>
                    <input type="number" name="cholesterol_level">
                </div>

                <button type="submit">💾 Save Patient</button>
            </form>
        </div>
    </div>

</body>
</html>
