<!DOCTYPE html>
<html>
<head>
    <title>Heart Attack Prediction</title>
</head>
<body>

<h2>Heart Attack Prediction</h2>

<form method="POST">

    <label>Age</label><br>
    <input type="number" name="age" required><br><br>

    <label>Gender</label><br>
    <select name="gender">
        <option value="1">Male</option>
        <option value="0">Female</option>
    </select><br><br>

    <label>Hypertension</label><br>
    <select name="hypertension">
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select><br><br>

    <label>Diabetes</label><br>
    <select name="diabetes">
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select><br><br>

    <label>Cholesterol Level</label><br>
    <input type="number" name="cholesterol_level" required><br><br>

    <label>Obesity</label><br>
    <select name="obesity">
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select><br><br>

    <label>Family History</label><br>
    <select name="family_history">
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select><br><br>

    <label>Stress Level</label><br>
    <select name="stress_level">
        <option value="0">Low</option>
        <option value="1">Moderate</option>
        <option value="2">High</option>
    </select><br><br>

    <label>Sleep Hours</label><br>
    <input type="number" step="0.1" name="sleep_hours" required><br><br>

    <label>Systolic BP</label><br>
    <input type="number" name="blood_pressure_systolic" required><br><br>

    <label>Diastolic BP</label><br>
    <input type="number" name="blood_pressure_diastolic" required><br><br>

    <label>Previous Heart Disease</label><br>
    <select name="previous_heart_disease">
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select><br><br>

    <button type="submit">
        Predict
    </button>

</form>

</body>
</html>
