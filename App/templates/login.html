<!DOCTYPE html>
<html>
<head>
    <title>Secure EHR Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="center-screen">
        <div class="card login-card">
            <div class="logo">❤️</div>
            <h2>Secure EHR System</h2>
            <p class="subtitle">Heart Attack Prediction &amp; Patient Management</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <p style="color:#e63946; font-size:0.85rem; text-align:center; margin-top:-10px; margin-bottom:18px;">
                        {{ messages[0] }}
                    </p>
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="field">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>

                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>

                <button type="submit" class="btn-block">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
