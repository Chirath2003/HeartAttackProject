<!DOCTYPE html>
<html>
<head>
    <title>Audit Logs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="topbar">
        <div class="brand"><span class="heart">❤️</span> Heart Attack Prediction System</div>
        <div class="user-info"><a href="/dashboard" style="color:#fff; text-decoration:none;">← Dashboard</a></div>
    </div>

    <div class="page-wrap">
        <h2>🗂️ Audit Logs</h2>
        <p style="color: var(--muted); margin-top:-8px;">Track of all user actions across the system for security &amp; compliance.</p>

        <table>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Role</th>
                <th>Action</th>
                <th>Time</th>
            </tr>

            {% for log in logs %}
            <tr>
                <td>{{ log.id }}</td>
                <td>{{ log.username }}</td>
                <td>{{ log.role }}</td>
                <td>{{ log.action }}</td>
                <td>{{ log.log_time }}</td>
            </tr>
            {% endfor %}
        </table>

        <div class="actions-row">
            <a href="/dashboard" class="btn btn-outline">Dashboard</a>
        </div>
    </div>

</body>
</html>
