<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
</head>

<body>

    <h2>Welcome {{ username }}</h2>

    <h3>Role: {{ role }}</h3>

    <hr>

    {% if role == "Admin" or role == "Doctor" %}
    <a href="/add_patient">Add Patient</a>
    <br><br>

    <a href="/predict">Predict Heart Attack</a>
    <br><br>
    {% endif %}

    <a href="/patients">View Patients</a>
    <br><br>

    {% if role == "Admin" %}
    <a href="/logs">Audit Logs</a>
    <br><br>
    {% endif %}

    <a href="/logout">Logout</a>

</body>

</html>
